<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEA Telecom | Painel de Roteiros</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --primary: #1e3a8a; --text-main: #1e293b; --bg-body: #f8fafc; 
            --card-bg: #ffffff; --border: #e2e8f0; --danger: #fee2e2; --danger-text: #dc2626; --success: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); padding: 20px; color: #334155; }
        .container { max-width: 1600px; margin: auto; }
        
        .card { background: var(--card-bg); border-radius: 12px; padding: 25px; border: 1px solid var(--border); }
        .section-header { 
            background: #f1f5f9; padding: 10px; border-radius: 6px; border-left: 4px solid var(--primary); 
            margin: 15px 0; font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase;
        }

        .input-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-end; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-main); margin-bottom: 6px; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; font-weight: 600; }

        .btn-add { background: #f0f7ff; border: 1px dashed var(--primary); color: var(--primary); padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: 700; margin-bottom: 20px; }
        .btn-submit { width: 100%; padding: 16px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* Estilo da Tabela Alinhado com as Imagens */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8fafc; padding: 15px; font-size: 11px; font-weight: 700; text-transform: uppercase; border-bottom: 2px solid var(--border); text-align: left; color: #64748b; }
        td { padding: 18px 15px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }

        .tec-name { font-weight: 800; color: #0f172a; font-size: 14px; text-transform: uppercase; }
        .route-pill { background: #f1f5f9; padding: 8px 14px; border-radius: 8px; border: 1px solid #e2e8f0; display: inline-flex; align-items: center; gap: 10px; }
        .q-badge { background: #0f172a; color: white; padding: 2px 8px; border-radius: 5px; font-size: 13px; font-weight: 800; }
        .arrow { color: #cbd5e1; font-weight: bold; margin: 0 8px; font-size: 18px; }
        
        .total-box { background: #dcfce7; color: #166534; padding: 8px 12px; border-radius: 8px; font-weight: 800; text-align: center; min-width: 40px; display: inline-block; }
        .btn-delete { color: var(--danger-text); background: var(--danger); border: none; padding: 8px 15px; border-radius: 6px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: grid; grid-template-columns: 420px 1fr; gap: 25px;">
        <aside class="card">
            <h2 style="font-weight: 800; margin-bottom: 20px; color: var(--text-main);">REGISTRAR ROTEIRO</h2>
            
            <label>Técnico Responsável</label>
            <select id="tecnico">
                <option value="">Selecione o técnico...</option>
                <option value="ADAILTON FONSECA">ADAILTON FONSECA</option>
                <option value="ANDERSON SOARES">ANDERSON SOARES</option>
                <option value="AUGUSTO CORRÊA">AUGUSTO CORRÊA</option>
                <option value="CLEYSON FRANK">CLEYSON FRANK</option>
                <option value="DAVID FERNANDES">DAVID FERNANDES</option>
                <option value="DELIEL SANDERLAN">DELIEL SANDERLAN</option>
                <option value="ESLON MORAES">ESLON MORAES</option>
                <option value="FRANSUEL DIAS">FRANSUEL DIAS</option>
                <option value="GABRIEL DE SOUSA">GABRIEL DE SOUSA</option>
                <option value="GEOVENE MELO">GEOVENE MELO</option>
                <option value="HERALDO DA SILVA">HERALDO DA SILVA</option>
                <option value="IAN JUNIOR">IAN JUNIOR</option>
                <option value="IGOR TAVARES">IGOR TAVARES</option>
                <option value="IVANILSON SILVA">IVANILSON SILVA</option>
                <option value="JADSON SANTANA">JADSON SANTANA</option>
                <option value="JAILTON DA SILVA">JAILTON DA SILVA</option>
                <option value="JOAO BATISTA">JOAO BATISTA</option>
                <option value="JONATHAN GOMES">JONATHAN GOMES</option>
                <option value="JORGE SEBASTIAO">JORGE SEBASTIAO</option>
                <option value="JOSE HUMBERTO">JOSE HUMBERTO</option>
                <option value="JOSÉ MARCOS">JOSÉ MARCOS</option>
                <option value="LUCAS DE LIMA">LUCAS DE LIMA</option>
                <option value="LUIZ FELIPE">LUIZ FELIPE</option>
                <option value="LUIZ HENRIQUE">LUIZ HENRIQUE</option>
                <option value="MANOEL NAZARENO">MANOEL NAZARENO</option>
                <option value="MARCOS CELSO">MARCOS CELSO</option>
                <option value="MAURICIO COSTA">MAURICIO COSTA</option>
                <option value="ODAIR JOSE">ODAIR JOSE</option>
                <option value="PEDRO HENRIQUE">PEDRO HENRIQUE</option>
                <option value="RENATO BARATA">RENATO BARATA</option>
                <option value="RONALDO LIMA">RONALDO LIMA</option>
                <option value="SILVIO ROBERTO">SILVIO ROBERTO</option>
                <option value="WELBER JOHN">WELBER JOHN</option>
                <option value="WELINGTON PINHEIRO">WELINGTON PINHEIRO</option>
                <option value="WESLEY PEREIRA">WESLEY PEREIRA</option>
                <option value="WILKER GERALDO">WILKER GERALDO</option>
                <option value="WILLIAMES DOUGLAS">WILLIAMES DOUGLAS</option>
            </select>

            <div class="section-header">Ponto de Origem</div>
            <div class="input-row">
                <div style="flex: 2;"><label>Cidade</label><select id="origem" class="lista-cidades"></select></div>
                <div style="flex: 1;"><label>Atend.</label><input type="number" id="qtdOrigem" value="0"></div>
            </div>

            <div class="section-header">Itinerário de Destinos</div>
            <div id="listaDestinos"></div>
            <button class="btn-add" onclick="addDestino()">+ ADICIONAR DESTINO</button>

            <label>Observação / Status</label>
            <select id="obs" style="margin-bottom: 20px;">
                <option value="Atendimento de rotina">Atendimento de rotina</option>
                <option value="Urgência / Prioridade">Urgência / Prioridade</option>
                <option value="Demanda reprimida">Demanda reprimida</option>
                <option value="Pendência de técnico anterior">Pendência de técnico anterior</option>
                <option value="Reforço de equipe">Reforço de equipe</option>
            </select>

            <button class="btn-submit" onclick="salvarRoteiro()">REGISTRAR NO PAINEL</button>
        </aside>

        <main class="card" id="printArea">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2 style="font-weight: 800; color: #1e293b; font-size: 24px;">Painel de Roteiros</h2>
                <button onclick="baixarPNG()" style="background:var(--success); color:white; border:none; padding:12px 24px; border-radius:8px; font-weight:800; cursor:pointer; text-transform: uppercase;">Baixar PNG</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th style="width: 20%;">Técnico</th>
                        <th style="width: 65%;">Origem ➔ Destinos</th>
                        <th style="width: 7%;">Total</th>
                        <th style="width: 8%;">Ação</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </main>
    </div>
</div>

<script>
    const cidadesOpcoes = [
        "Ananindeua", "Augusto Corrêa", "Belém", "Benevides", "Bragança", "Capanema", 
        "Capitão Poço", "Castanhal", "Colares", "Curuçá", "Igarapé-Açu", "Inhangapi", 
        "Maracanã", "Marapanim", "Marituba", "Ourém", "Paragominas", "Primavera", 
        "Quatipuru", "Salinópolis", "Santa Isabel do Pará", "Santa Maria do Pará", 
        "Santo Antônio do Tauá", "São Caetano de Odivelas", "São Domingos do Capim", 
        "São Francisco do Pará", "São Miguel do Guamá", "Terra Alta", "Tracuateua", "Vigia"
    ];

    let dados = JSON.parse(localStorage.getItem('sea_final_v8')) || [];

    function popularCidades() {
        const selects = document.querySelectorAll('.lista-cidades');
        const options = cidadesOpcoes.map(c => `<option value="${c}">${c}</option>`).join('');
        selects.forEach(s => s.innerHTML = options);
    }

    function addDestino() {
        const div = document.createElement('div');
        div.className = 'input-row destino-item';
        div.innerHTML = `
            <div style="flex: 2;"><select class="d-cidade">${cidadesOpcoes.map(c => `<option value="${c}">${c}</option>`).join('')}</select></div>
            <div style="flex: 1;"><input type="number" class="d-qtd" value="1"></div>
            <button style="border:none; background:none; color:#ef4444; cursor:pointer; font-weight:bold; font-size:18px; padding-bottom:10px;" onclick="this.parentElement.remove()">✕</button>
        `;
        document.getElementById('listaDestinos').appendChild(div);
    }

    function salvarRoteiro() {
        const tec = document.getElementById('tecnico').value;
        if(!tec) return alert("Selecione um técnico.");

        const novo = {
            id: Date.now(),
            tecnico: tec,
            origem: { nome: document.getElementById('origem').value, qtd: parseInt(document.getElementById('qtdOrigem').value) || 0 },
            destinos: Array.from(document.querySelectorAll('.destino-item')).map(el => ({
                nome: el.querySelector('.d-cidade').value,
                qtd: parseInt(el.querySelector('.d-qtd').value) || 0
            })),
            obs: document.getElementById('obs').value
        };

        dados.unshift(novo);
        localStorage.setItem('sea_final_v8', JSON.stringify(dados));
        render();
        document.getElementById('listaDestinos').innerHTML = '';
        document.getElementById('qtdOrigem').value = 0;
        addDestino();
    }

    function render() {
        const tbody = document.getElementById('corpoTabela');
        tbody.innerHTML = dados.map(item => {
            const total = item.origem.qtd + item.destinos.reduce((acc, d) => acc + d.qtd, 0);
            return `
                <tr>
                    <td class="tec-name">${item.tecnico}</td>
                    <td>
                        <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 4px;">
                            <div class="route-pill"><b>${item.origem.nome}</b> <span class="q-badge">${item.origem.qtd}</span></div>
                            ${item.destinos.length > 0 ? '<span class="arrow">➔</span>' : ''}
                            ${item.destinos.map((d, idx) => `
                                <div class="route-pill"><b>${d.nome}</b> <span class="q-badge">${d.qtd}</span></div>
                                ${idx < item.destinos.length - 1 ? '<span class="arrow">➔</span>' : ''}
                            `).join('')}
                        </div>
                        <div style="margin-top: 10px; font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase;">
                            OBS: ${item.obs}
                        </div>
                    </td>
                    <td><span class="total-box">${total}</span></td>
                    <td><button class="btn-delete" onclick="remover(${item.id})">Excluir</button></td>
                </tr>
            `;
        }).join('');
    }

    function remover(id) {
        if(confirm("Deseja excluir este roteiro?")) {
            dados = dados.filter(d => d.id !== id);
            localStorage.setItem('sea_final_v8', JSON.stringify(dados));
            render();
        }
    }

    async function baixarPNG() {
        const area = document.getElementById('printArea');
        const canvas = await html2canvas(area, { scale: 2 });
        const link = document.createElement('a');
        link.download = `Painel_SEA_Telecom.png`;
        link.href = canvas.toDataURL();
        link.click();
    }

    window.onload = () => { popularCidades(); addDestino(); render(); };
</script>
</body>
</html>
