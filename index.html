            --primary-dark: #1d4ed8;

            --bg-main: #f1f5f9;
            --card-bg: #ffffff;

            --danger: #dc2626;

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-regular); padding: 30px; }
        .container { max-width: 1400px; margin: auto; }
        
        header {
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        header h1 { font-size: 24px; font-weight: 800; color: var(--text-bold); text-transform: uppercase; }

        .status-cloud { font-size: 12px; font-weight: 700; color: var(--success); display: flex; align-items: center; gap: 5px; }

        .dashboard-grid { display: grid; grid-template-columns: 380px 1fr; gap: 25px; }

        .card { background: var(--card-bg); border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 700; color: var(--text-bold); margin-bottom: 5px; text-transform: uppercase; }
        
        select {
            width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--border);
            font-size: 14px; font-weight: 600; color: var(--text-bold); background: white; outline: none;
        }

        .btn-submit {
            width: 100%; padding: 15px; background-color: var(--primary); color: white;
            border: none; border-radius: 8px; font-size: 14px; font-weight: 800; cursor: pointer; transition: 0.2s;
        }

        .btn-submit:hover { background-color: var(--primary-dark); }

        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .btn-download {
            padding: 10px 15px; background-color: var(--success); color: white;
            border: none; border-radius: 6px; font-weight: 700; font-size: 12px; cursor: pointer;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; border-bottom: 2px solid var(--border); text-align: left; }
        td { padding: 15px; font-size: 14px; border-bottom: 1px solid #e2e8f0; color: var(--text-bold); font-weight: 700; }

        .badge-service { background: #dbeafe; color: #1e40af; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; }
        
        .btn-delete { color: var(--danger); background: #fee2e2; border: none; padding: 6px 10px; border-radius: 6px; font-weight: 800; cursor: pointer; }

    </style>

<script>
    const BIN_ID = "69aac19ed0ea881f40f51104";
    const SECRET_KEY = "$2a$10$OCvV0EQunKhQKKTZBhUQ/.//aQrFwn6qeIzDL2qBCrX1jLMcKCDcy";
    let dadosLocais = [];

    // Carregar dados ao iniciar
    window.onload = async () => {
        try {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { "X-Master-Key": SECRET_KEY }
            });
            const result = await response.json();
            dadosLocais = Array.isArray(result.record) ? result.record : [];
            document.getElementById('loading').style.display = 'none';
            renderizarTabela();
        } catch (e) {
            console.error("Erro ao carregar:", e);
            document.getElementById('loading').innerText = "Erro ao conectar com a nuvem.";
        }
    };

    async function registrar() {
        const tecnico = document.getElementById('tecnico').value;
        const origem = document.getElementById('origem').value;
        const destino = document.getElementById('destino').value;
        const servico = document.getElementById('servico').value;
        const obs = document.getElementById('obs').value;

        if(!tecnico || !origem || !destino) return alert("Preencha os campos!");

        const novo = { tecnico, origem, destino, servico, obs, id: Date.now() };
        dadosLocais.unshift(novo);
        
        renderizarTabela();
        await salvarNuvem();
        
        document.getElementById('origem').selectedIndex = 0;
        document.getElementById('destino').selectedIndex = 0;
    }

    async function salvarNuvem() {
        document.getElementById('cloudStatus').innerText = "☁ Salvando...";
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": SECRET_KEY
                },
                body: JSON.stringify(dadosLocais)
            });
            document.getElementById('cloudStatus').innerText = "● Sincronizado";
        } catch (e) {
            alert("Erro ao salvar dados!");
        }
    }

    function renderizarTabela() {
        const tbody = document.querySelector("#tabelaDados tbody");
        tbody.innerHTML = "";
        dadosLocais.forEach(item => {
            const row = tbody.insertRow();
            row.innerHTML = `
                <td>${item.tecnico}</td>
                <td>De: ${item.origem}<br>Para: ${item.destino}</td>
                <td><span class="badge-service">${item.servico}</span></td>
                <td>${item.obs}</td>
                <td class="no-print"><button class="btn-delete" onclick="remover(${item.id})">Excluir</button></td>
            `;
        });
    }

    async function remover(id) {
        dadosLocais = dadosLocais.filter(item => item.id !== id);
        renderizarTabela();
        await salvarNuvem();
    }

    async function baixarPNG() {
        const area = document.getElementById('cardArea');
        const prints = document.querySelectorAll('.no-print');
        const btnd = document.querySelector('.btn-download');

        btnd.style.display = 'none';
        prints.forEach(el => el.style.visibility = 'hidden');

        const canvas = await html2canvas(area, { scale: 2 });

        btnd.style.display = 'block';
        prints.forEach(el => el.style.visibility = 'visible');

        const link = document.createElement('a');
        link.download = 'Relatorio_SEA.png';
        link.href = canvas.toDataURL();
        link.click();
    }
</script>
